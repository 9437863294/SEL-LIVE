<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SEL Driver</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #e0f2fe 0%, #f8fafc 55%, #e2e8f0 100%);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 440px);
        border-radius: 18px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 24px 60px -32px rgba(2, 132, 199, 0.45);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #334155;
      }
      code {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>SEL Driver Mobile</h1>
      <p>
        Configure <code>CAPACITOR_LIVE_URL</code> in <code>.env</code> so the app can open the Driver Module route.
      </p>
    </section>
  </body>
</html>
