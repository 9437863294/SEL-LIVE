# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1

env:
  # ── SMTP (Nodemailer) ───────────────────────────────────────────────
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_USER
    value: data.management@selindia.net
    availability:
      - RUNTIME
  - variable: SMTP_FROM_NAME
    value: Siddhartha Engineering Limited
    availability:
      - RUNTIME
  - variable: SMTP_FROM_EMAIL
    value: data.management@selindia.net
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    secret: smtp-pass
    availability:
      - RUNTIME

  # ── reCAPTCHA v2 ───────────────────────────────────────────────────
  - variable: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
    value: 6LdVhlstAAAAAK7cn8oFprUVIJkTWQyhGbdqb9l_
    availability:
      - BUILD

  - variable: RECAPTCHA_SECRET_KEY
    value: 6LdVhlstAAAAAJIF5o1b8Z6--r-yNPN2340HizCs
    availability:
      - RUNTIME

  # ── Firebase Admin SDK (server-side routes) ─────────────────────────
  - variable: FIREBASE_PROJECT_ID
    secret: firebase-project-id
    availability:
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase-client-email
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability:
      - RUNTIME
